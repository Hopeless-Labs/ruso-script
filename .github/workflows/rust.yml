name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout ruso-script
      uses: actions/checkout@v4
      with:
        path: ruso-script
    - name: Checkout ruso-runtime (sibling for [patch] override)
      uses: actions/checkout@v4
      with:
        repository: Hopeless-Labs/ruso-runtime
        ref: main
        path: ruso-runtime
    - name: Build
      working-directory: ruso-script
      run: cargo build --verbose
    - name: Run tests
      working-directory: ruso-script
      run: cargo test --verbose
