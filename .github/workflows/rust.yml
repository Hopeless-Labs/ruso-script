name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ruso-script
        uses: actions/checkout@v4
        with:
          path: ruso-script
      - name: Checkout ruso-runtime (sibling for [patch] override)
        uses: actions/checkout@v4
        with:
          repository: Hopeless-Labs/ruso-runtime
          ref: main
          path: ruso-runtime
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruso-script
      - name: Check formatting
        working-directory: ruso-script
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: ruso-script
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        working-directory: ruso-script
        run: cargo build --verbose
      - name: Test
        working-directory: ruso-script
        run: cargo test --verbose

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ruso-script
        uses: actions/checkout@v4
        with:
          path: ruso-script
      - name: Checkout ruso-runtime (sibling for [patch] override)
        uses: actions/checkout@v4
        with:
          repository: Hopeless-Labs/ruso-runtime
          ref: main
          path: ruso-runtime
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruso-script
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true
      - name: Audit dependencies
        working-directory: ruso-script
        run: cargo audit
